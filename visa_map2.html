*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif}

/* 벽 질감 배경 */
body{
  background-color:#2a2820;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(0,0,0,.02) 4px,rgba(0,0,0,.02) 8px);
}

/* 헤더 */
.hd{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:rgba(30,28,24,0.95);border-bottom:1px solid rgba(180,160,120,0.2);backdrop-filter:blur(10px)}
.hd-left{display:flex;align-items:center;gap:14px}
.hd-badge{background:linear-gradient(135deg,#003087,#0051c3);padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.hd-div{width:1px;height:20px;background:rgba(180,160,120,0.3)}
.hd-title{font-size:14px;font-weight:600;color:#d4c8a8;letter-spacing:.3px}
.hd-info{font-size:11px;color:#9a8a6a;text-align:right;line-height:1.7}

/* 검색 */
.sw{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:50;width:100%;max-width:480px;padding:12px 20px}
.sb{position:relative}
.sb input{width:100%;padding:13px 46px 13px 18px;background:rgba(40,36,28,0.9);border:1.5px solid rgba(180,160,120,0.3);border-radius:10px;color:#e0d4b0;font-family:inherit;font-size:14px;outline:none;transition:all .25s;backdrop-filter:blur(10px)}
.sb input:focus{border-color:rgba(200,180,100,0.6);background:rgba(50,46,36,0.95);box-shadow:0 0 0 3px rgba(200,180,100,0.1)}
.sb input::placeholder{color:rgba(180,160,120,.5)}
.si-icon{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:rgba(180,160,120,.6);font-size:15px;pointer-events:none}
.dd{position:absolute;top:calc(100% + 5px);left:0;right:0;background:rgba(30,28,22,0.98);border:1.5px solid rgba(180,160,120,.2);border-radius:10px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.8);display:none;backdrop-filter:blur(20px);max-height:280px;overflow-y:auto}
.dd.show{display:block}
.dd::-webkit-scrollbar{width:3px}
.dd::-webkit-scrollbar-thumb{background:rgba(180,160,120,.3);border-radius:4px}
.ddi{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s}
.ddi:hover{background:rgba(180,160,120,.08)}
.ddi-name{font-size:13px;font-weight:600;color:#e0d4b0}
.ddi-name mark{background:rgba(200,180,100,.3);color:#e0d4b0;border-radius:2px;padding:0 2px}
.ddi-type{font-size:11px;color:#9a8a6a;margin-top:1px}
.ddi-arr{font-size:12px;color:rgba(180,160,120,.4)}
.dd-empty{padding:16px;text-align:center;font-size:13px;color:#9a8a6a}

/* 사이드바 */
.sidebar{position:fixed;left:0;top:58px;bottom:0;width:210px;z-index:45;background:rgba(28,26,20,0.95);border-right:1px solid rgba(180,160,120,0.15);backdrop-filter:blur(16px);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s ease}
.sidebar.collapsed{transform:translateX(-210px)}
.sidebar-header{padding:11px 16px;border-bottom:1px solid rgba(180,160,120,0.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-title{font-size:10px;font-weight:700;color:#c0a860;letter-spacing:1.2px;text-transform:uppercase}
.sidebar-count{font-size:10px;color:#7a6a4a;background:rgba(180,160,100,.1);padding:2px 8px;border-radius:10px}
.sidebar-list{overflow-y:auto;flex:1;padding:4px 0}
.sidebar-list::-webkit-scrollbar{width:2px}
.sidebar-list::-webkit-scrollbar-thumb{background:rgba(180,160,120,.2);border-radius:4px}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.025);transition:background .12s}
.sidebar-item:hover{background:rgba(180,160,100,.07)}
.sidebar-item.active{background:rgba(180,160,100,.12);border-left:2px solid #c0a860}
.sidebar-flag img{width:20px;height:14px;border-radius:2px;object-fit:cover;opacity:.9}
.sidebar-name{font-size:11px;font-weight:600;color:#d4c8a8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-types{font-size:9px;color:#7a6a4a;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-toggle{position:fixed;left:210px;top:50%;transform:translateY(-50%);z-index:46;width:16px;height:44px;background:rgba(28,26,20,0.95);border:1px solid rgba(180,160,120,0.2);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#c0a860;font-size:10px;transition:left .3s ease}
.sidebar-toggle.collapsed{left:0}

/* 지도 */
#map{position:fixed;top:58px;bottom:0;left:210px;right:0;transition:left .3s ease}
#map.full{left:0}
#worldmap{width:100%;height:100%}
#pathsvg{position:fixed;top:58px;bottom:0;left:210px;right:0;pointer-events:none;z-index:35;transition:left .3s ease}
#pathsvg.full{left:0}
.sw{left:calc(50% + 105px);transition:left .3s ease}
.sw.full{left:50%}

/* 메탈릭 대륙 스타일 */
.country-metal{
  fill:url(#metalGrad);
  stroke:#8a8070;
  stroke-width:0.4;
  filter:url(#metalShadow);
  cursor:pointer;
  transition:filter .2s;
}
.country-metal:hover{
  filter:url(#metalHover);
}
.country-metal.has-visa{
  fill:url(#metalGradVisa);
  stroke:#b0a080;
  stroke-width:0.6;
  cursor:pointer;
}
.country-metal.has-visa:hover{
  fill:url(#metalGradVisaHover);
}
.country-korea{
  fill:url(#koreaGrad);
  stroke:#4ab8ff;
  stroke-width:1;
  filter:url(#koreaGlow);
}

/* 도시 시계 */
.city-clock{position:absolute;pointer-events:none;text-align:center}
.city-name{font-family:'Orbitron',monospace;font-size:8px;font-weight:400;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.city-time{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;text-shadow:0 0 10px rgba(255,255,255,.8),0 0 20px rgba(255,255,255,.4);animation:flicker 8s infinite}
@keyframes flicker{0%,98%,100%{opacity:1}99%{opacity:.9}}

/* POSCO 로고 */
.posco-logo{
  position:absolute;
  font-family:'Orbitron',monospace;
  text-align:center;
  pointer-events:none;
  z-index:10;
}
.posco-main{
  font-size:22px;
  font-weight:900;
  letter-spacing:4px;
  color:#fff;
  text-shadow:0 0 15px rgba(255,255,255,.9),0 0 30px rgba(255,255,255,.5),0 0 60px rgba(200,200,255,.3);
  animation:neon-pulse 3s ease-in-out infinite alternate;
}
.posco-sub{
  font-size:9px;
  font-weight:400;
  letter-spacing:5px;
  color:rgba(255,255,255,.7);
  text-shadow:0 0 8px rgba(255,255,255,.6);
  margin-top:2px;
}
@keyframes neon-pulse{
  0%{text-shadow:0 0 10px rgba(255,255,255,.8),0 0 25px rgba(255,255,255,.4)}
  100%{text-shadow:0 0 20px rgba(255,255,255,1),0 0 40px rgba(255,255,255,.6),0 0 80px rgba(200,220,255,.4)}
}

/* 비행기 */
#plane{position:fixed;font-size:24px;z-index:40;display:none;pointer-events:none;filter:drop-shadow(0 0 6px #ffd700)}

/* 팝업 */
.popup{position:fixed;z-index:60;left:50%;bottom:32px;transform:translateX(-50%);background:linear-gradient(145deg,rgba(28,26,20,0.98),rgba(38,34,24,0.98));border:1.5px solid rgba(180,160,100,.3);border-radius:16px;padding:18px 22px;min-width:230px;box-shadow:0 20px 60px rgba(0,0,0,.95),inset 0 1px 0 rgba(200,180,100,.08);display:none;backdrop-filter:blur(24px)}
.popup.show{animation:pop .3s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.75)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.popup-flag{margin-bottom:8px}
.popup-flag img{width:64px;height:43px;border-radius:5px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.popup-country{font-size:19px;font-weight:700;color:#e0d4b0;margin-bottom:8px}
.popup-info{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}
.info-card{background:rgba(180,160,100,.06);border:1px solid rgba(180,160,100,.12);border-radius:7px;padding:7px 9px}
.info-card-label{font-size:9px;color:#7a6a4a;margin-bottom:2px;letter-spacing:.5px}
.info-card-value{font-size:13px;font-weight:700;color:#e0d4b0}
.info-card-sub{font-size:9px;color:#c0a860;margin-top:1px}
.popup-type-label{font-size:10px;color:#7a6a4a;margin-bottom:4px;margin-top:6px}
.popup-types{display:flex;flex-direction:column;gap:7px}
.type-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:rgba(180,160,100,.07);border:1px solid rgba(180,160,100,.2);border-radius:8px;color:#e0d4b0;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;width:100%}
.type-btn:hover{background:rgba(180,160,100,.15);border-color:rgba(200,180,100,.4);transform:translateX(2px)}
.type-btn-arrow{color:#c0a860;font-size:12px}
.popup-close{position:absolute;top:11px;right:12px;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.35);font-size:14px;cursor:pointer;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}

.icn-dot{position:fixed;z-index:45;pointer-events:none;transform:translate(-50%,-50%)}
.icn-ring{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle,#fff 20%,#4ab8ff 80%);box-shadow:0 0 0 0 rgba(74,184,255,.9);animation:icn-pulse 2s infinite}
@keyframes icn-pulse{0%{box-shadow:0 0 0 0 rgba(74,184,255,.9)}70%{box-shadow:0 0 0 12px rgba(74,184,255,0)}100%{box-shadow:0 0 0 0 rgba(74,184,255,0)}}
.icn-label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;color:#4ab8ff;white-space:nowrap;letter-spacing:1px}

.loading{position:fixed;inset:0;top:58px;display:flex;align-items:center;justify-content:center;z-index:20;color:#9a8a6a;font-size:13px;gap:8px}
.ld{width:7px;height:7px;border-radius:50%;background:#c0a860;display:inline-block;animation:ldot 1.2s infinite}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

function loadVisaData(){
  fetch(API_URL,{method:'GET',headers:{'Content-Type':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(json){
      var items=Array.isArray(json)?json:(json.value||[]);
      var map={};
      items.forEach(function(item){
        var country=item.Title||item['{Name}']||'';
        var type='';
        var vf=item['OData__xbe44__xc790__xc720__xd615_0'];
        if(vf&&vf.Value){type=vf.Value;}
        else{Object.keys(item).forEach(function(k){if(k.indexOf('xbe44')>-1&&item[k]&&typeof item[k]==='object'&&item[k].Value)type=item[k].Value;});}
        if(!country)return;
        if(!map[country])map[country]=[];
        if(type)map[country].push(type);
      });
      Object.keys(map).forEach(function(c){
        var geo=GEO[c]||{};
        VISA[c]=Object.assign({},geo,{t:map[c]});
      });
      VISA_LOADED=true;
      idToName={};
      Object.keys(VISA).forEach(function(n){if(VISA[n].id)idToName[VISA[n].id]=n;});
      renderSidebar();
      initSearch();
    })
    .catch(function(){
      Object.keys(GEO).forEach(function(c){VISA[c]=Object.assign({},GEO[c],{t:['개선중']});});
      VISA_LOADED=true;
      idToName={};
      Object.keys(VISA).forEach(function(n){if(VISA[n].id)idToName[VISA[n].id]=n;});
      renderSidebar();
      initSearch();
    });
}

var MAP_URLS=['./countries-110m.json','https://unpkg.com/world-atlas@2/countries-110m.json'];
function loadMap(urls,idx){
  if(idx>=urls.length){document.getElementById('loading').style.display='none';placeICN();return;}
  d3.json(urls[idx]).then(function(world){
    document.getElementById('loading').style.display='none';
    var countries=topojson.feature(world,world.objects.countries);
    svg.selectAll('.cp')
      .data(countries.features)
      .enter().append('path')
      .attr('class',function(d){
        var id=+d.id;
        if(id===410) return 'country-korea';
        if(idToName[id]) return 'country-metal has-visa';
        return 'country-metal';
      })
      .attr('d',path)
      .on('click',function(event,d){var name=idToName[+d.id];if(name)fly(name);})
      .append('title').text(function(d){var name=idToName[+d.id];return name?name+' (클릭)':'';});

    svg.append('path')
      .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b;}))
      .attr('d',path).attr('fill','none')
      .attr('stroke','rgba(100,90,70,0.4)').attr('stroke-width','0.4');

    // 테두리
    svg.append('path').datum({type:'Sphere'})
      .attr('d',path).attr('fill','none')
      .attr('stroke','rgba(180,160,100,0.2)').attr('stroke-width','1');

    // POSCO 로고 배치
    var center=proj([127,37]);
    var fo=svg.append('foreignObject')
      .attr('x',center[0]-80).attr('y',center[1]+60)
      .attr('width',160).attr('height',50);
    fo.append('xhtml:div')
      .attr('class','posco-logo')
      .style('position','relative')
      .html('<div class="posco-main">posco</div><div class="posco-sub">INTERNATIONAL</div>');

    // 도시 시계 배치
    CITY_CLOCKS.forEach(function(c){
      var pt=proj([c.lng,c.lat]);
      if(!pt) return;
      var fo2=svg.append('foreignObject')
        .attr('x',pt[0]-35).attr('y',pt[1]-32)
        .attr('width',70).attr('height',34);
      fo2.append('xhtml:div')
        .attr('class','city-clock')
        .attr('id','clock-'+c.name.replace(/\s/g,'-'))
        .style('position','relative')
        .html('<div class="city-name">'+c.name+'</div><div class="city-time" id="t-'+c.name.replace(/[\s\/]/g,'-')+'">00:00</div>');
    });

    updateClocks();
    setInterval(updateClocks,1000);
    placeICN();
    setTimeout(placeICN,200);
  }).catch(function(){loadMap(urls,idx+1);});
}

function updateClocks(){
  var now=new Date();
  CITY_CLOCKS.forEach(function(c){
    var ms=now.getTime()+(now.getTimezoneOffset()*60000)+(c.tz*60000);
    var d2=new Date(ms);
    var t=d2.getHours().toString().padStart(2,'0')+':'+d2.getMinutes().toString().padStart(2,'0');
    var el=document.getElementById('t-'+c.name.replace(/[\s\/]/g,'-'));
    if(el) el.textContent=t;
  });
}

function ll2screen(lng,lat){
  var pt=proj([lng,lat]);
  var r=document.getElementById('worldmap').getBoundingClientRect();
  return{x:r.left+pt[0]*(r.width/W),y:r.top+pt[1]*(r.height/H)};
}
function ll2svg(lng,lat){return proj([lng,lat]);}

function placeICN(){
  var sc=ll2screen(ICN.lng,ICN.lat);
  var el=document.getElementById('icnDot');
  el.style.left=sc.x+'px';el.style.top=sc.y+'px';
}

var SEARCH_INIT=false;
function initSearch(){
  if(SEARCH_INIT)return;SEARCH_INIT=true;
  function getCL(){return Object.keys(VISA).sort(function(a,b){return a.localeCompare(b,'ko');});}
  document.getElementById('si').addEventListener('input',function(){
    var q=this.value.trim(),dd=document.getElementById('dd');
    if(!q){dd.classList.remove('show');dd.innerHTML='';return;}
    var m=getCL().filter(function(c){return c.indexOf(q)>=0;});
    if(!m.length){dd.innerHTML='<div class="dd-empty">검색 결과 없음</div>';dd.classList.add('show');return;}
    dd.innerHTML=m.slice(0,8).map(function(c){
      var d=VISA[c],lbl=c.split(q).join('<mark>'+q+'</mark>');
      return '<div class="ddi" onclick="fly(\''+c+'\')">'
        +'<div><div class="ddi-name">'+lbl+'</div>'
        +'<div class="ddi-type">'+(d.t||[]).join(' / ')+'</div></div>'
        +'<span class="ddi-arr">→</span></div>';
    }).join('');
    dd.classList.add('show');
  });
  function doSearch(){
    var q=document.getElementById('si').value.trim();
    if(!q)return;
    var m=getCL().filter(function(c){return c.indexOf(q)>=0;});
    if(m.length)fly(m[0]);
  }
  document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
  document.querySelector('.si-icon').style.cursor='pointer';
  document.querySelector('.si-icon').addEventListener('click',doSearch);
  document.addEventListener('click',function(e){if(!e.target.closest('.sb'))document.getElementById('dd').classList.remove('show');});
}

window.fly=function(country){
  document.getElementById('dd').classList.remove('show');
  document.getElementById('si').value=country;
  setSidebarActive(country);
  var popup=document.getElementById('popup');
  popup.style.display='none';popup.classList.remove('show');
  if(cT)clearInterval(cT);
  var d=VISA[country];if(!d)return;
  var fs=ll2svg(ICN.lng,ICN.lat),ts=ll2svg(d.lng,d.lat);
  if(!fs||!ts)return;
  var mx=(fs[0]+ts[0])/2,my=Math.min(fs[1],ts[1])-Math.abs(ts[0]-fs[0])*0.3-30;
  var pe=document.getElementById('flightpath');
  pe.setAttribute('d','M'+fs[0]+','+fs[1]+' Q'+mx+','+my+' '+ts[0]+','+ts[1]);
  pe.setAttribute('stroke','rgba(255,210,80,0.7)');pe.setAttribute('opacity','1');
  var pl=document.getElementById('plane');pl.style.display='block';
  var dur=3000,start=null;
  (function step(ts2){
    if(!start)start=ts2;
    var p=Math.min((ts2-start)/dur,1),ep=p<0.5?2*p*p:-1+(4-2*p)*p;
    var bx=(1-ep)*(1-ep)*fs[0]+2*(1-ep)*ep*mx+ep*ep*ts[0];
    var by=(1-ep)*(1-ep)*fs[1]+2*(1-ep)*ep*my+ep*ep*ts[1];
    var tp=Math.min(ep+0.01,1);
    var tnx=(1-tp)*(1-tp)*fs[0]+2*(1-tp)*tp*mx+tp*tp*ts[0];
    var tny=(1-tp)*(1-tp)*fs[1]+2*(1-tp)*tp*my+tp*tp*ts[1];
    var angle=Math.atan2(tny-by,tnx-bx)*180/Math.PI;
    var r=document.getElementById('worldmap').getBoundingClientRect();
    pl.style.left=(r.left+bx*(r.width/W)-13)+'px';
    pl.style.top=(r.top+by*(r.height/H)-13)+'px';
    pl.style.transform='rotate('+angle+'deg)';
    if(p<1){requestAnimationFrame(step);}
    else{setTimeout(function(){pl.style.display='none';pe.setAttribute('opacity','0.15');showPopup(country,d);},150);}
  })(performance.now());
};

function showPopup(country,d){
  var popup=document.getElementById('popup');
  var flagEl=document.getElementById('pflag');
  if(d.iso){
    flagEl.innerHTML='<img src="https://flagcdn.com/w80/'+d.iso+'.png" alt="'+country+'" onerror="this.style.display=\'none\'">';
  } else {
    flagEl.innerHTML='';
  }
  document.getElementById('pcountry').textContent=country;
  var infoEl=document.getElementById('pinfo');
  if(d.tz!==undefined&&d.fly!==undefined){
    var KST=540,diff=(d.tz-KST)/60;
    var diffStr=diff===0?'한국과 동일':(diff>0?'+'+diff+'시간':diff+'시간');
    var now=new Date();
    var localMs=now.getTime()+(now.getTimezoneOffset()*60000)+(d.tz*60000);
    var local=new Date(localMs);
    var hh=local.getHours().toString().padStart(2,'0'),mm=local.getMinutes().toString().padStart(2,'0');
    infoEl.innerHTML='<div class="info-card"><div class="info-card-label">⏰ 현지 시각</div><div class="info-card-value">'+hh+':'+mm+'</div><div class="info-card-sub">시차 '+diffStr+'</div></div>'
      +'<div class="info-card"><div class="info-card-label">✈ 비행시간</div><div class="info-card-value">약 '+d.fly+'시간</div><div class="info-card-sub">인천 직항 기준</div></div>';
  } else {infoEl.innerHTML='';}
  var typesEl=document.getElementById('ptypes');
  typesEl.innerHTML=(d.t||[]).map(function(type){
    if(!type||type==='개선중') return '<div class="type-btn" style="opacity:.5;cursor:default;pointer-events:none;"><span>🔧 페이지 개선중</span><span class="type-btn-arrow">—</span></div>';
    var url=typeToSlug(country,type);
    return '<a class="type-btn" href="'+url+'" target="_blank"><span>📋 '+type+'</span><span class="type-btn-arrow">→</span></a>';
  }).join('');
  popup.style.display='block';
  requestAnimationFrame(function(){popup.classList.add('show');});
}

window.closePopup=function(){
  document.getElementById('popup').style.display='none';
  document.getElementById('popup').classList.remove('show');
  if(cT)clearInterval(cT);
};

function renderSidebar(){
  var list=document.getElementById('sidebar-list');
  var CL=Object.keys(VISA).sort(function(a,b){return a.localeCompare(b,'ko');});
  document.getElementById('sidebar-count').textContent=CL.length+'개국';
  list.innerHTML=CL.map(function(country){
    var d=VISA[country];
    var flagHtml=d.iso?'<img src="https://flagcdn.com/w40/'+d.iso+'.png" onerror="this.style.display=\'none\'">':'';
    var types=(d.t||[]).join(' · ');
    return '<div class="sidebar-item" id="si-'+country+'" onclick="fly(\''+country+'\')">'
      +'<div class="sidebar-flag">'+flagHtml+'</div>'
      +'<div><div class="sidebar-name">'+country+'</div>'
      +'<div class="sidebar-types">'+types+'</div></div>'
      +'</div>';
  }).join('');
}

function setSidebarActive(country){
  document.querySelectorAll('.sidebar-item').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('si-'+country);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});}
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar'),tg=document.getElementById('sidebar-toggle');
  var map=document.getElementById('map'),ps=document.getElementById('pathsvg');
  var sw=document.querySelector('.sw');
  sb.classList.toggle('collapsed');tg.classList.toggle('collapsed');
  map.classList.toggle('full');ps.classList.toggle('full');sw.classList.toggle('full');
  tg.textContent=sb.classList.contains('collapsed')?'▶':'◀';
  setTimeout(placeICN,350);
}
